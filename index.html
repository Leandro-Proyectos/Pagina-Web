<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechPulse — Tu Portal de Tecnología</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<script>
/* ============================================================
   ✏️  ZONA DE EDICIÓN — CAMBIÁ TODO ACÁ ARRIBA
   ============================================================ */

// 🌐 DATOS DEL SITIO
var TITULO_WEB = "TechPulse";
var SLOGAN     = "Noticias de Tecnología e IA";

// 🚀 NOTICIA DESTACADA (La grande de la izquierda)
var DESTACADA_IMAGEN = "https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1000"; // ← LINK DE FOTO
var DESTACADA_TITULO = "El impacto de la IA en el trabajo diario: ¿Evolución o reemplazo?";
var DESTACADA_DESC   = "Analizamos cómo las nuevas herramientas de inteligencia artificial están cambiando la productividad en las empresas modernas.";
var DESTACADA_LINK   = "https://google.com"; // ← LINK A DONDE LLEVA
var DESTACADA_TAG    = "INTELIGENCIA ARTIFICIAL";

// 📰 NOTICIA 2 (Derecha arriba)
var N2_IMAGEN = "https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=500";
var N2_TITULO = "Nuevos procesadores para laptops en 2026";
var N2_LINK   = "https://google.com";
var N2_TAG    = "HARDWARE";

// 📰 NOTICIA 3 (Derecha abajo)
var N3_IMAGEN = "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=500";
var N3_TITULO = "Guía completa: Cómo armar tu primer set-up de streaming";
var N3_LINK   = "https://google.com";
var N3_TAG    = "GUÍA";

/* ============================================================
   ⚠️ NO TOCAR NADA DE ACÁ PARA ABAJO
   ============================================================ */
</script>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --accent: #00e5ff;
    --text: #e8e8f0;
    --muted: #7a7a9a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    margin: 0;
    padding: 0;
  }

  header {
    padding: 20px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    text-decoration: none;
  }

  .container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
  }

  @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
    border: 1px solid #222;
  }

  .card:hover { transform: translateY(-5px); border-color: var(--accent); }

  .img-box { height: 300px; overflow: hidden; position: relative; }
  .img-box img { width: 100%; height: 100%; object-fit: cover; }

  .card-body { padding: 20px; }
  .tag { font-size: 10px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  h2, h3 { margin: 10px 0; font-family: 'Syne', sans-serif; }

  .side-col { display: flex; flex-direction: column; gap: 20px; }
  .small-card .img-box { height: 150px; }
  .small-card h3 { font-size: 1rem; }

  footer { text-align: center; padding: 40px; color: var(--muted); border-top: 1px solid #222; margin-top: 50px; }
</style>
</head>
<body>

<header>
  <a href="#" class="logo" id="logo-text">LOGO</a>
  <nav style="color:var(--muted); font-size: 0.8rem;">Modo: Administrador Fácil</nav>
</header>

<div class="container">
  <div class="main-grid">
    <div id="render-destacada"></div>

    <div class="side-col">
      <div id="render-n2"></div>
      <div id="render-n3"></div>
    </div>
  </div>
</div>

<footer id="footer-text"></footer>

<script>
  // DIBUJAR CONTENIDO AUTOMÁTICAMENTE
  document.getElementById("logo-text").innerText = TITULO_WEB;
  document.getElementById("footer-text").innerHTML = "© 2026 " + TITULO_WEB + " | " + SLOGAN;

  // Render noticia grande
  document.getElementById("render-destacada").innerHTML = `
    <a href="${DESTACADA_LINK}" class="card" target="_blank">
      <div class="img-box"><img src="${DESTACADA_IMAGEN}"></div>
      <div class="card-body">
        <span class="tag">${DESTACADA_TAG}</span>
        <h2>${DESTACADA_TITULO}</h2>
        <p style="color:var(--muted)">${DESTACADA_DESC}</p>
      </div>
    </a>`;

  // Render noticias pequeñas
  document.getElementById("render-n2").innerHTML = renderSmall(N2_LINK, N2_IMAGEN, N2_TAG, N2_TITULO);
  document.getElementById("render-n3").innerHTML = renderSmall(N3_LINK, N3_IMAGEN, N3_TAG, N3_TITULO);

  function renderSmall(link, img, tag, title) {
    return `
      <a href="${link}" class="card small-card" target="_blank">
        <div class="img-box"><img src="${img}"></div>
        <div class="card-body">
          <span class="tag">${tag}</span>
          <h3>${title}</h3>
        </div>
      </a>`;
  }
</script>

</body>
</html>
